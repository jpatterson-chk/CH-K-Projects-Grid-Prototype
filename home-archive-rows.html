<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>CHYBIK + KRISTOF — Justified rows</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="home-archive-rows.css">
  <script src="chrome.js"></script>
</head>
<body id="top">
  <site-nav></site-nav>

  <main class="page">
    <!-- Justified-rows gallery (built by justified-rows.js): full-width rows,
         fixed 200px image height, uniform gaps, aspect-driven widths, with a
         full-width pull-quote band between two row groups. -->
    <section id="archive" aria-label="Projects"></section>

    <section class="project-list" id="projects" aria-label="Project list">
      <header class="project-list__head">
        <h2 class="project-list__title">Projects</h2>
        <div class="project-list__labels" aria-hidden="true">
          <span>City</span><span>Category</span><span>Status</span><span>Year</span>
        </div>
      </header>
      <div class="project-list__rows" id="projectRows"></div>
      <button class="project-list__more" id="projectMore" type="button">View More +</button>
    </section>
  </main>

  <site-footer></site-footer>

  <!-- Jump menu uses same-page anchors (no base); label tracks the section. -->
  <site-jump label="Selected Projects"></site-jump>

  <!-- Image list + this page's display order, then precomputed aspect ratios and
       the shared code map, then the justified-rows renderer. -->
  <script src="manifest.js"></script>
  <script src="home-archive-order.js"></script>
  <script src="image-ratios.js"></script>
  <script src="archive-data.js"></script>
  <script src="justified-rows.js"></script>

  <!-- Project-list data + its shared renderer. -->
  <script src="projects.js"></script>
  <script src="project-list.js"></script>

  <!-- Shared nav toggle + jump-menu label behaviour. -->
  <script src="site.js"></script>
</body>
</html>
