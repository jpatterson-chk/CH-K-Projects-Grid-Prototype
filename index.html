<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    /* ---------------------------------------------------------------------
       Reset / base
    --------------------------------------------------------------------- */
    *,
    *::before,
    *::after { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: #fafafa;
      color: #000;
      font-family: "Arial", Arial,
                   system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      padding: 16px;
    }

    /* ---------------------------------------------------------------------
       Grid container
       Column count and card width are FIXED per breakpoint (not auto-fit /
       minmax). The grid fills the full content width; `space-between`
       distributes the leftover horizontal space into the column gaps, so the
       gutters grow and shrink with the viewport while card width stays fixed.
       (Exception: the widescreen breakpoint sizes cards in vw — see below.)
    --------------------------------------------------------------------- */
    .module-archive {
      /* Defaults = smallest breakpoint (<= 640px). Overridden below. */
      --module-archive-cols: 2;
      --archive-card-w: 155px;
      --archive-card-gap: 96px;    /* row gap */

      display: grid;
      grid-template-columns: repeat(var(--module-archive-cols), var(--archive-card-w));
      row-gap: var(--archive-card-gap);
      column-gap: 16px;            /* minimum gap; space-between adds more on wider viewports */
      justify-content: space-between;
      align-items: start;
    }

    /* 641px – 1024px */
    @media (min-width: 641px) {
      .module-archive {
        --module-archive-cols: 3;
        --archive-card-w: 160px;
        --archive-card-gap: 96px;
      }
      .page { padding: 56px 40px; }
    }

    /* 1025px – 1280px */
    @media (min-width: 1025px) {
      .module-archive {
        --module-archive-cols: 4;
        --archive-card-w: 160px;
        --archive-card-gap: 96px;
      }
      .page { padding: 64px 48px; }
    }

    /* 1281px – 1440px */
    @media (min-width: 1281px) {
      .module-archive {
        --module-archive-cols: 4;
        --archive-card-w: 192px;
        --archive-card-gap: 96px;
      }
      .page { padding: 72px 64px; }
    }

    /* 1441px – 1680px */
    @media (min-width: 1441px) {
      .module-archive {
        --module-archive-cols: 5;
        --archive-card-w: 15vw;
        --archive-card-gap: 96px;
      }
      .page { padding: 24px 24px; }
    }

    /* > 1680px */
    @media (min-width: 1681px) {
      .module-archive {
        --module-archive-cols: 5;
        --archive-card-w: 12vw;      /* widescreen: scale cards up on very wide screens */
        --archive-card-gap: 96px;
      }
      .page { padding: 24px 24px; }
    }

    /* ---------------------------------------------------------------------
       Card — no border, background, shadow, or lift. Just image + title.
    --------------------------------------------------------------------- */
    .archive-card {
      margin: 0;
      display: block;
    }

    .archive-card__img {
      display: block;
      width: 100%;       /* fills --archive-card-w */
      height: auto;      /* preserves natural aspect ratio */
      transition: opacity 0.25s ease;
    }

    .archive-card:hover .archive-card__img {
      opacity: 0.7;      /* the only hover effect */
    }

    .archive-card__title {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.35;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #000;    /* light grey, understated */
    }

    .archive-empty {
      color: #9a9a9a;
      font-size: 13px;
      text-align: center;
      padding: 64px 0;
    }

    /* ---------------------------------------------------------------------
       Top navigation bar
       The wordmark and its suffix are ALWAYS a single run of inline text, so
       wrapped lines naturally align to the left edge. Toggling MENU just swaps
       which suffix shows (the "= ARCHITECTS" tagline vs. the studio facts) —
       a one-line display swap, with no change of layout mode. The right-hand
       control swaps MENU <-> × via the same stacked-cell technique.
    --------------------------------------------------------------------- */
    :root { --ck-muted: #808080; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fafafa;
      color: #000;
      font-size: clamp(16px, 1.28vw, 24px);
      line-height: 1.3;
      letter-spacing: 0.015em;
      text-transform: uppercase;
    }

    /* Reserves the closed, single-line bar height in normal flow. The real bar
       (.nav__bar) overlays it and is free to grow downward over the page, so
       opening the menu never shifts the content below it. */
    .nav__sizer {
      margin: 0;
      padding: 16px;
      white-space: nowrap;
      visibility: hidden;
    }

    .nav__bar {
      position: absolute;
      inset: 0 0 auto 0;
      display: flex;
      align-items: flex-start;   /* toggle pins to the top line */
      justify-content: space-between;
      gap: 24px;
      padding: 16px;
      /* The closed strip is already covered by .nav's solid background, so the
         bar's own fill only matters for the expanded region. Fade it in/out
         with the facts (same 0.3s ease) so the panel and text feel like one
         transition. Transparent-white (not `transparent`) keeps it a pure
         alpha ramp — no grey midpoint. */
      background-color: rgba(250, 250, 250, 0);
      transition: background-color 0.3s ease;
    }

    @media (min-width: 641px)  { .nav__sizer, .nav__bar { padding: 16px 24px; } }
    @media (min-width: 1025px) { .nav__sizer, .nav__bar { padding: 18px 24px; } }

    /* The wordmark + suffix live in one paragraph of inline text and take all
       width up to the toggle, so the facts can wrap onto further lines. */
    .nav__text {
      margin: 0;
      flex: 1 1 auto;
      min-width: 0;
    }

    .nav__brand   { color: #000; white-space: nowrap; }  /* never break the wordmark */
    .nav .m       { color: var(--ck-muted); }            /* grey connectors + numbers */

    /* The tagline (closed) and facts (open) share the suffix slot. The facts
       fade via opacity; the tagline just swaps in/out. The catch is ordering
       on CLOSE: the facts must leave the flow BEFORE the tagline re-enters it,
       or both occupy the line and force an extra wrap. CSS can't sequence this
       — a discrete `display` flip to a visible value takes effect immediately,
       ignoring transition-delay — so JS drives the close: it adds .is-closing
       to fade the facts out, then on transitionend drops it, which hides the
       facts and restores the tagline in a SINGLE reflow. */
    .nav__tagline { color: var(--ck-muted); }
    .nav__facts {
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Mobile: "= ARCHITECTS" is too long for the closed bar — drop it. */
    @media (max-width: 640px) { .nav__tagline { display: none; } }

    /* Open and closing both keep the facts in the slot and the tagline out. */
    .nav.is-open .nav__tagline,
    .nav.is-closing .nav__tagline { display: none; }
    .nav.is-open .nav__facts,
    .nav.is-closing .nav__facts   { display: inline; }

    /* Facts are opaque only while fully open; .is-closing lets opacity fall
       back to its 0 base, fading them out. @starting-style supplies the 0 ->
       1 start when opening. */
    .nav.is-open .nav__facts { opacity: 1; }
    @starting-style {
      .nav.is-open .nav__facts { opacity: 0; }
    }

    /* Panel fill fades in lockstep: solid only when open, reverting to its
       transparent base while closing. */
    .nav.is-open .nav__bar { background-color: #fafafa; }

    /* Right control: MENU <-> × , stacked in one cell, right-aligned. */
    .nav__toggle {
      flex: none;
      display: inline-grid;
      align-items: center;
      justify-items: end;
      margin: 0;
      padding: 0;
      border: 0;
      background: none;
      font: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      color: #000;
      cursor: pointer;
    }
    .nav__toggle > * {
      grid-area: 1 / 1;
      transition: opacity 0.3s ease;
    }
    .nav__toggle-label { opacity: 1; }
    .nav__toggle-close {
      opacity: 0;
      display: inline-flex;
      align-items: center;
    }
    .nav__toggle-close svg { display: block; }

    .nav.is-open .nav__toggle-label { opacity: 0; }
    .nav.is-open .nav__toggle-close { opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      .nav__bar,
      .nav__tagline,
      .nav__facts,
      .nav__toggle > * { transition: none; }
    }

    /* ---------------------------------------------------------------------
       Project list
       A table-style listing with progressive disclosure. The header (title +
       column labels) and every row share one column template (--project-cols)
       so the labels sit directly over their data columns. On narrow screens
       the grid collapses and each row flows as a single comma-separated line.
    --------------------------------------------------------------------- */
    .project-list {
      --project-cols: minmax(0, 2.2fr) 1fr 1fr 1fr 0.8fr;
      margin-top: 96px;
    }

    /* Title + the 4 column labels on one baseline-aligned row. */
    .project-list__head {
      display: grid;
      grid-template-columns: var(--project-cols);
      column-gap: 24px;
      align-items: baseline;
      padding-bottom: 48px;
    }

    .project-list__title {
      margin: 0;
      font-size: 40px;
      font-weight: 400;
      line-height: 1;
      color: #000;
    }

    /* display:contents lets the 4 label spans land in grid columns 2-5. */
    .project-list__labels { display: contents; }
    .project-list__labels > span {
      color: var(--ck-muted);
      font-size: clamp(16px, 1.28vw, 24px);
      letter-spacing: 0.015em;
    }

    /* One row = the shared grid. No border, background, or shadow. */
    .project-row {
      display: grid;
      grid-template-columns: var(--project-cols);
      column-gap: 24px;
      padding: 4px 0;
      font-size: clamp(16px, 1.28vw, 24px);
      letter-spacing: 0.015em;
      color: #000;
    }

    .project-row__num {
      margin-right: 0.5em;
      color: var(--ck-muted);
    }

    /* The `.project-row` display rules above override the UA's
       `[hidden] { display: none }`, so re-assert it for JS-hidden rows. */
    .project-row[hidden] { display: none; }

    /* Teaser: the last visible row fades while more rows remain hidden. */
    .project-row.is-fade { opacity: 0.35; }

    /* Minimal text button, centered below the rows. */
    .project-list__more {
      display: block;
      margin: 32px auto 0;
      padding: 0;
      border: 0;
      background: none;
      font: inherit;
      color: var(--ck-muted);
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .project-list__more:hover { color: #000; }
    .project-list__more[hidden] { display: none; }

    /* Mobile: collapse each row to a single flowing line of text:
       "### Project Name, City, CZ, category, status, 2026." */
    @media (max-width: 640px) {
      .project-list { margin-top: 64px; }
      .project-list__labels { display: none; }

      .project-row {
        display: block;
        padding: 8px 0;
        line-height: 1.4;
      }
      .project-row__cell,
      .project-row__num,
      .project-row__name { display: inline; }

      /* Separators between the inline cells (desktop grid shows none). */
      .project-row__name::after { content: ", "; }
      .project-row__cell + .project-row__cell::after { content: ", "; }
      .project-row__cell:last-child::after { content: "."; }
    }

    @media (prefers-reduced-motion: reduce) {
      .project-list__more { transition: none; }
    }
  </style>
</head>
<body>
  <header class="nav" id="nav">
    <div class="nav__sizer" aria-hidden="true">CHYBIK + KRISTOF</div>
    <div class="nav__bar">
      <p class="nav__text"><span class="nav__brand">CHYBIK <span class="m">+</span> KRISTOF</span><span class="nav__tagline"> = ARCHITECTS</span><span class="nav__facts"> <span class="m">+</span> <span class="m">74</span>&nbsp;ARCHITECTS <span class="m">+</span> <span class="m">153</span>&nbsp;CLIENTS <span class="m">+</span> <span class="m">20</span>&nbsp;COUNTRIES <span class="m">=</span> <span class="m">608</span>&nbsp;PROJECTS<span class="m">;</span> <span class="m">16</span>&nbsp;INSIGHTS<span class="m">;</span> <span class="m">22</span>&nbsp;UPDATES<span class="m">;</span> <span class="m">1</span>&nbsp;BOOK<span class="m">;</span> <span class="m">3</span>&nbsp;JOBS<span class="m">;</span> <span class="m">4</span>&nbsp;OFFICES<span class="m">.</span></span></p>

      <button class="nav__toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="nav" aria-label="Toggle studio facts">
        <span class="nav__toggle-label">MENU</span>
        <span class="nav__toggle-close" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25">
            <line x1="2" y1="2" x2="14" y2="14"></line>
            <line x1="14" y1="2" x2="2" y2="14"></line>
          </svg>
        </span>
      </button>
    </div>
  </header>

  <main class="page">
    <section class="module-archive" id="archive" aria-label="Projects"></section>

    <section class="project-list" aria-label="Project list">
      <header class="project-list__head">
        <h2 class="project-list__title">Projects</h2>
        <div class="project-list__labels" aria-hidden="true">
          <span>City</span><span>Category</span><span>Status</span><span>Year</span>
        </div>
      </header>
      <div class="project-list__rows" id="projectRows"></div>
      <button class="project-list__more" id="projectMore" type="button">View More +</button>
    </section>
  </main>

  <!-- Generated list of filenames in ./images/ (see generate-manifest.sh). -->
  <script src="manifest.js"></script>
  <script>
    (function () {
      var grid = document.getElementById("archive");
      var images = window.PROJECT_IMAGES || [];

      if (!images.length) {
        grid.innerHTML =
          '<p class="archive-empty">No images found. Add files to ./images/ ' +
          'and run ./generate-manifest.sh</p>';
        return;
      }

      // reformat caption text
      function titleFromFilename(name) {
        return name
          .replace(/\.[^.]+$/, "")        // drop extension
          .replace(/[-_]+/g, " ")          // dashes/underscores -> spaces
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
      }

      var frag = document.createDocumentFragment();

      images.forEach(function (file) {
        var title = titleFromFilename(file);

        var card = document.createElement("figure");
        card.className = "archive-card";

        var img = document.createElement("img");
        img.className = "archive-card__img";
        img.src = "images/" + file;
        img.alt = title;

        var caption = document.createElement("figcaption");
        caption.className = "archive-card__title";
        caption.textContent = title;

        card.appendChild(img);
        card.appendChild(caption);
        frag.appendChild(card);
      });

      grid.appendChild(frag);
    })();
  </script>

  <!-- Project list: build all placeholder rows up front, then reveal them 10
       at a time. The last visible row fades as a teaser while more remain. -->
  <script>
    (function () {
      var rowsEl = document.getElementById("projectRows");
      var moreBtn = document.getElementById("projectMore");
      if (!rowsEl || !moreBtn) return;

      var TOTAL = 30, STEP = 10, shown = 0;

      // Idempotent: if the script re-runs (e.g. live-preview hot reload), start
      // from an empty container so we never end up with duplicate rows and a
      // stranded faded row from a previous pass.
      rowsEl.innerHTML = "";

      var frag = document.createDocumentFragment();
      for (var i = 0; i < TOTAL; i++) {
        var row = document.createElement("div");
        row.className = "project-row";
        row.hidden = true;
        row.innerHTML =
          '<span class="project-row__cell"><span class="project-row__num">###</span>' +
          '<span class="project-row__name">Project Name</span></span>' +
          '<span class="project-row__cell">City, CZ</span>' +
          '<span class="project-row__cell">category</span>' +
          '<span class="project-row__cell">status</span>' +
          '<span class="project-row__cell">2026</span>';
        frag.appendChild(row);
      }
      rowsEl.appendChild(frag);
      var allRows = rowsEl.querySelectorAll(".project-row");

      function render() {
        allRows.forEach(function (r, idx) {
          r.hidden = idx >= shown;
          r.classList.remove("is-fade");
        });
        var moreRemain = shown < TOTAL;
        moreBtn.hidden = !moreRemain;
        if (moreRemain && shown > 0) allRows[shown - 1].classList.add("is-fade");
      }

      moreBtn.addEventListener("click", function () {
        shown = Math.min(shown + STEP, TOTAL);
        render();
      });

      shown = STEP;
      render();
    })();
  </script>

  <!-- Nav toggle: swap the tagline for the studio facts (and MENU for x).
       Opening is a plain class toggle; closing is sequenced so the facts leave
       the flow before the tagline returns (see the .is-closing CSS above). -->
  <script>
    (function () {
      var nav = document.getElementById("nav");
      var toggle = document.getElementById("navToggle");
      if (!nav || !toggle) return;

      var facts = nav.querySelector(".nav__facts");
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)");
      var closeTimer;

      function setAria(open) {
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
        toggle.setAttribute(
          "aria-label",
          open ? "Hide studio facts" : "Toggle studio facts"
        );
      }

      // Hide the faded-out facts and restore the tagline in ONE reflow, so they
      // never share the line.
      function finishClose() {
        clearTimeout(closeTimer);
        nav.classList.remove("is-closing");
      }

      function open() {
        clearTimeout(closeTimer);
        nav.classList.remove("is-closing");
        nav.classList.add("is-open");
        setAria(true);
      }

      function close() {
        nav.classList.remove("is-open");
        setAria(false);
        if (reduce.matches) return;       // no fade: base styles close instantly
        nav.classList.add("is-closing");  // fade facts out, then finishClose()
        clearTimeout(closeTimer);
        closeTimer = setTimeout(finishClose, 400);  // fallback if transitionend is missed
      }

      toggle.addEventListener("click", function () {
        if (nav.classList.contains("is-open")) close();
        else open();
      });

      // The facts' opacity fade IS the close animation; end it when that fade
      // finishes. Guarded so a re-open mid-close (is-closing already gone) is a
      // no-op.
      facts.addEventListener("transitionend", function (e) {
        if (e.propertyName === "opacity" && nav.classList.contains("is-closing")) {
          finishClose();
        }
      });
    })();
  </script>
</body>
</html>
